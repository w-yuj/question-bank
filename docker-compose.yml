services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-question_bank}
      MYSQL_USER: ${MYSQL_USER:-question_bank}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - ./chromadb_data:/data
    ports:
      - "18001:8000"

  storage-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: pro
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /app/uploads /app/static/media
        chown -R "${UID:-1000}:${GID:-1000}" /app/uploads /app/static
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/static:/app/static
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: pro
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DB_URL: ${DB_URL:-mysql+aiomysql://question_bank:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-question_bank}}
      CHROMADB_HOST: ${CHROMADB_HOST:-chromadb}
      CHROMADB_PORT: ${CHROMADB_PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "18000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/static:/app/static
    depends_on:
      storage-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: pro
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    command: python -m app.worker
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DB_URL: ${DB_URL:-mysql+aiomysql://question_bank:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-question_bank}}
      CHROMADB_HOST: ${CHROMADB_HOST:-chromadb}
      CHROMADB_PORT: ${CHROMADB_PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/static:/app/static
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: pro
    restart: unless-stopped
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "18080:80"
    depends_on:
      - backend

volumes:
  mysql_data:
